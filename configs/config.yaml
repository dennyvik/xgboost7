data:
  path: data/raw/XAUUSD_M1.csv
  required_columns:
    - datetime
    - open
    - high
    - low
    - close

run:
  model: xgb7
  dataset: m1
  output_dir: outputs/runs

split:
  train_end: 2025-04-01
  val_end: 2025-10-01

sampling:
  ratio: 8
  random_state: 42

label:
  horizon_bars: 5
  threshold: 0.002

model:
  max_depth: 4
  learning_rate: 0.05
  n_estimators: 200
  scale_pos_weight: 8
  random_state: 42
  n_jobs: -1

evaluation:
  top_k: [0.5, 1, 2]

debug:
  output_dir: outputs/debug
  sample_rows: 1000