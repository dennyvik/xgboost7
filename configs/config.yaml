data:
  path: data/raw/XAUUSD_M1.csv
  required_columns:
    - datetime
    - open
    - high
    - low
    - close

run:
  model: xgb7
  dataset: m1
  output_dir: outputs/runs

split:
  train_end: 2025-04-01
  val_end: 2025-10-01

sampling:
  ratio: 8
  random_state: 42

label:
  horizon_bars: 10
  threshold: 0.0015

model:
  max_depth: 5
  learning_rate: 0.05
  n_estimators: 200
  scale_pos_weight: 8
  random_state: 42
  n_jobs: -1

evaluation:
  top_k: [0.5, 1, 2]

# Feature selection — omit or leave empty to use all registry features.
# Supported keys:
#   enabled: explicit list of feature names
#   groups:  list of groups  (momentum | volatility | structure | event)
features: {}

# GridSearchCV tuning — disabled by default.
tuning:
  enabled: false
  method: grid
  param_grid:
    max_depth: [4, 6]
    learning_rate: [0.05, 0.1]
    n_estimators: [100, 200]
  cv: 3

# SHAP analysis — disabled by default.
shap:
  enabled: false
  sample_size: 10000

debug:
  output_dir: outputs/debug
  sample_rows: 1000